services:
  # --- BACKEND: Python Flask API & Ray Agents ---
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: atc_server_container
    # Standard settings for interactive terminal and debugging
    tty: true
    stdin_open: true
    ports:
      - "5001:5000"  # Map Flask API port
      - "8265:8265"  # Map Ray Dashboard (Actor visualization)
    volumes:
      # Mount the entire root folder to /workspace to see both client/server in VS Code
      - .:/workspace 
    environment:
      - PYTHONUNBUFFERED=1     # Ensure logs are printed to console immediately
      - FLASK_ENV=development  # Enable hot-reloading for the API
    # Set the working directory to the server subfolder for Python imports
    working_dir: /workspace/server
    command: python main.py

  # --- FRONTEND: Web UI (Nginx) ---
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: atc_client_container
    ports:
      - "8080:80"    # Map Nginx (port 80) to localhost:8080
    volumes:
      # Sync only the client folder with Nginx's public directory
      - ./client:/usr/share/nginx/html:ro
    # The frontend waits for the backend to be ready
    depends_on:
      - server
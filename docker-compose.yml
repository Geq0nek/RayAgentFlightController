services:
  atc-system:
    # 1. Build the image using the Dockerfile located in the current directory
    build: 
      context: .
      dockerfile: Dockerfile
    
    # 2. Container name as displayed in Docker Desktop / CLI
    container_name: atc_agent_container
    # Keeps the container running and allows interactive terminal access
    tty: true          
    stdin_open: true   

    # 3. Port mapping (Host:Container)
    ports:
      - "5001:5000"  # Flask API / Web Interface
      - "8265:8265"  # Ray Dashboard (Actor visualization)

    # 4. Volume synchronization
    # Maps the local directory to /app inside the container.
    # Enables hot-reloading: code changes on host reflect instantly in the container.
    volumes:
      - .:/app

    # 5. Environment variables
    environment:
      - PYTHONUNBUFFERED=1 # Ensures Python logs are flushed to the terminal in real-time
      - FLASK_ENV=development # Enables Flask debug mode and auto-reload

    # 6. Startup configuration
    working_dir: /app
    command: python main.py
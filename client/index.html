<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Flight Controller - Ray Agents</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <nav>
        <button id="btn-radar" class="active" onclick="showPage('radar')">📡 Live Radar</button>
        <button id="btn-history" onclick="showPage('history')">📜 Historia Lotów</button>
    </nav>

    <div id="main-content">
        
        <!-- WEB 1: RADAR -->
        <section id="page-radar" class="page-view active">
            <h2>System Kontroli Lotów (Live)</h2>
            <div id="map">
            </div>

        <div id="info-panel" class="side-panel">
            <span class="close-btn" onclick="document.getElementById('info-panel').classList.remove('active')">&times;</span>
            <div id="panel-content">
            </div>
        </div>
        </section>

        <!-- WEB 2: HISTOIRCAL DATA -->
        <section id="page-history" class="page-view">
            <h2>Logi Historyczne i Decyzje Agentów</h2>
            <table>
            </table>
        </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/map_manager.js"></script>
</body>
</html>
